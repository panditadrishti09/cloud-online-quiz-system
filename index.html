<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Quiz System – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">☁️ CloudQuiz</div>
    <div class="nav-info">
      <span class="tag-saas" style="background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:0.8rem;">SaaS</span>
      <span class="tag-paas" style="background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:0.8rem;">PaaS</span>
      <span class="tag-iaas" style="background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:0.8rem;">IaaS</span>
    </div>
  </nav>

  <!-- AUTH SECTION -->
  <div class="auth-wrapper">
    <div class="card auth-card">
      <h2>Welcome to CloudQuiz</h2>
      <p class="subtitle">A Cloud-Based Online Quiz System · SPPU TE Computer Engineering</p>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn"        onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginTab" class="tab-content active">
        <div id="loginMsg" class="msg"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUser" placeholder="Enter username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Enter password" />
        </div>
        <button class="btn btn-primary" onclick="doLogin()">Login →</button>
        <p style="text-align:center;margin-top:14px;font-size:0.85rem;color:var(--muted);">
          Demo: <strong>admin</strong> / <strong>admin123</strong>
        </p>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerTab" class="tab-content">
        <div id="regMsg" class="msg"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUser" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="Your email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPass" placeholder="Choose a password" />
        </div>
        <button class="btn btn-primary" onclick="doRegister()">Create Account →</button>
      </div>

      <!-- Cloud tags for viva -->
      <div class="cloud-tags">
        <span class="cloud-tag tag-saas">SaaS – Web Interface</span>
        <span class="cloud-tag tag-paas">PaaS – Node.js Runtime</span>
        <span class="cloud-tag tag-iaas">IaaS – AWS EC2</span>
        <span class="cloud-tag tag-hdfs">HDFS – Log Analysis</span>
      </div>
    </div>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/me').then(r => r.json()).then(data => {
      if (data.loggedIn) window.location.href = '/quiz.html';
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function doLogin() {
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      if (!username || !password) return showMsg('loginMsg', 'Please fill all fields.', 'error');

      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (data.success) {
        showMsg('loginMsg', 'Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/quiz.html', 800);
      } else {
        showMsg('loginMsg', data.error || 'Login failed', 'error');
      }
    }

    async function doRegister() {
      const username = document.getElementById('regUser').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPass').value;
      if (!username || !email || !password) return showMsg('regMsg', 'Please fill all fields.', 'error');

      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();

      if (data.success) {
        showMsg('regMsg', 'Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/quiz.html', 800);
      } else {
        showMsg('regMsg', data.error || 'Registration failed', 'error');
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginTab').classList.contains('active')) doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
